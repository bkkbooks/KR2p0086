body:
  text: 子乎故不以至命侵箴尹曰天加訛禍於楚邦吾君盪出威視亡名焉是故弗知也祓天之女就昭王之亡要遇王於隨待戰於澨戰於津戰於長曲陶三戰而三止而邦人不稱勇焉就復邦之後蓋冠爲王獲而邦人不稱美焉就白公之禍聞令尹司馬既死將適郢葉之諸老皆諫曰不可必以師葉公子高曰不得王將必死何以師爲乃乘馹車五乘遂適郢至未得王昭夫人謂葉公子高先君之子聚在外君之言過昔周盍擇而立之邦既有王毋亦勸乎葉公子高曰万千君㫃旱幹何施獻之惑也而并是二者以邦君君猶小之一懼君之不終世保邦既言乃服固祝而止之蔡大祝止須邦君加冠冕爲服出就蔡大祝踊二拜頓首曰今日踊既失邦或得之蔡大寍禍賞之以西廣田百畛辭曰君王諍臣之請命未嘗不許辭不受賞命之為令尹辭命之為司馬辭曰以葉之遠不可畜也焉假為司馬不取其實而邦人不稱榮焉
